<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>FRONTLINE LOGIC - HTML Prototype</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #f6f7fb;
        font-family: sans-serif;
        touch-action: manipulation;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 2px 4px 6px;
        box-sizing: border-box;
      }

      .app {
        width: min(100%, 480px);
        display: grid;
        gap: 2px;
      }

      canvas {
        background: #ffffff;
        border: 1px solid #d9dde8;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        display: block;
        width: 100%;
        height: auto;
        max-width: 100%;
        touch-action: manipulation;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      .gauge-card,
      .panel {
        background: #ffffff;
        border: 1px solid #d9dde8;
        border-radius: 10px;
        padding: 4px 7px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }

      .gauge-card {
        display: grid;
        gap: 1px;
        padding: 3px 7px;
      }

      .gauge-label-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        font-weight: 700;
        color: #111827;
      }

      .gauge-row {
        display: grid;
        gap: 0;
      }

      .gauge-track {
        height: 10px;
        border-radius: 999px;
        border: 1px solid #253047;
        background: #ffffff;
        overflow: hidden;
      }

      .gauge-fill {
        height: 100%;
        background: #2f7d32;
        width: 100%;
      }

      .gauge-fill.low {
        background: #c62828;
      }

      .gauge-fill.mid {
        background: #d97706;
      }

      .gauge-value {
        display: none;
      }

      .gauge-card.enemy {
        display: none;
      }

      .panel {
        display: grid;
        gap: 1px;
      }

      .result-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(15, 23, 42, 0.72);
        padding: 16px;
        box-sizing: border-box;
      }

      .result-overlay.show {
        display: flex;
      }

      .result-card {
        width: min(100%, 280px);
        display: grid;
        gap: 8px;
        justify-items: center;
        background: linear-gradient(180deg, #ffffff, #f8fafc);
        border: 1px solid #cbd5e1;
        border-radius: 14px;
        padding: 14px 14px 12px;
        box-shadow: 0 14px 32px rgba(15, 23, 42, 0.24);
        text-align: center;
      }

      .result-title {
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 0.08em;
        color: #111827;
        line-height: 1;
      }

      .result-subtitle {
        font-size: 13px;
        font-weight: 700;
        color: #374151;
        line-height: 1.2;
      }

      .commands {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2px;
      }

      button {
        appearance: none;
        border: 1px solid #cbd5e1;
        background: #ffffff;
        color: #111827;
        border-radius: 10px;
        padding: 12px 4px;
        min-height: 52px;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }

      button:hover {
        background: #f8fafc;
      }

      button:active {
        transform: translateY(1px);
      }

      .selection {
        min-height: 0;
        font-size: 11px;
        font-weight: 700;
        color: #1f2937;
        line-height: 1.2;
        word-break: break-word;
      }

      #operator {
        padding: 1px 6px;
        background: rgba(255, 255, 255, 0.75);
        border: 1px solid rgba(203, 213, 225, 0.8);
        border-radius: 8px;
        font-size: 11px;
        line-height: 1.25;
        touch-action: manipulation;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      .result-card #restartButton {
        width: 100%;
        padding: 10px 8px;
        font-size: 14px;
      }

      @media (max-width: 520px) {
        body {
          padding: 2px 3px 5px;
        }

        .commands {
          gap: 2px;
        }

        button {
          padding: 6px 3px;
          font-size: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="gauge-card enemy">
        <div class="gauge-label-row">
          <span>B BASE HP</span>
          <span id="bGaugeValueText">10000 / 10000</span>
        </div>
        <div class="gauge-row">
          <div class="gauge-track"><div id="bGauge" class="gauge-fill"></div></div>
          <div id="bGaugeValue" class="gauge-value">10000 / 10000</div>
        </div>
      </section>
      <canvas id="canvas" width="480" height="670"></canvas>
      <section class="gauge-card">
        <div class="gauge-label-row">
          <span>本陣HP</span>
          <span id="aGaugeValueText">10000 / 10000　修理状況: なし</span>
        </div>
        <div class="gauge-row">
          <div class="gauge-track"><div id="aGauge" class="gauge-fill"></div></div>
          <div id="aGaugeValue" class="gauge-value">10000 / 10000</div>
        </div>
      </section>
      <div class="panel">
        <div id="roundInfo" class="selection">Round 1 / 10</div>
        <div id="operator" class="selection">司令、戦況を確認してください。<br />現在の作戦候補を提示します。</div>
        <div class="commands">
          <button type="button" data-command="A.中央突破">A.中央突破</button>
          <button type="button" data-command="B.側面展開">B.側面展開</button>
          <button type="button" data-command="C.迎撃対応">C.迎撃対応</button>
        </div>
      </div>
    </div>
    <div id="resultOverlay" class="result-overlay" aria-hidden="true">
      <div class="result-card">
        <div id="resultTitle" class="result-title"></div>
        <div id="resultSubtitle" class="result-subtitle"></div>
        <div id="resultHistory" class="result-subtitle"></div>
        <button type="button" id="restartButton">Restart</button>
      </div>
    </div>
    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const maxBaseHp = 10000;
      const maxRound = 10;
      const maxUnitsA = 8;
      const maxUnitsB = 8;
      const repairUnitNames = ["L_1", "S_1", "R_3", "J_2", "H_4", "E_5", "L_6", "S_7"];

      const state = {
        round: 1,
        baseHpA: maxBaseHp,
        baseHpB: maxBaseHp,
        result: null,
        commandHistory: [],
        repairQueueA: [],
        repairQueueB: [],
        damagePoolA: 0,
        damagePoolB: 0,
        nextRepairUnitIndexA: 0,
        nextRepairUnitIndexB: 0,
      };

      const map = [
        ["forest", "forest", "forest", "forest", "base", "plain", "plain", "plain", "plain"],
        ["forest", "forest", "forest", "forest", "road", "plain", "plain", "plain", "plain"],
        ["forest", "forest", "forest", "road", "road", "road", "plain", "plain", "plain"],
        ["forest", "forest", "road", "forest", "road", "plain", "road", "plain", "plain"],
        ["forest", "forest", "road", "forest", "road", "plain", "road", "plain", "plain"],
        ["forest", "road", "forest", "forest", "road", "plain", "plain", "road", "plain"],
        ["river", "bridge", "river", "river", "bridge", "river", "river", "bridge", "river"],
        ["forest", "road", "forest", "forest", "road", "plain", "plain", "road", "plain"],
        ["forest", "forest", "road", "forest", "road", "plain", "road", "plain", "plain"],
        ["forest", "forest", "road", "forest", "road", "plain", "road", "plain", "plain"],
        ["forest", "forest", "forest", "road", "road", "road", "plain", "plain", "plain"],
        ["forest", "forest", "forest", "forest", "road", "plain", "plain", "plain", "plain"],
        ["forest", "forest", "forest", "forest", "base", "plain", "plain", "plain", "plain"],
      ];

      const terrainStyles = {
        base: { fill: "#000000", label: "基" },
        forest: { fill: "#2f6b3f", label: "森" },
        road: { fill: "#c7a26a", label: "道" },
        plain: { fill: "#dfe9c6", label: "平" },
        river: { fill: "#4f8fcf", label: "川" },
        bridge: { fill: "#b8894e", label: "橋" },
      };

      function getTerrainStyle(terrain) {
        return terrainStyles[terrain] ?? { fill: "#cccccc", label: "?" };
      }

      function getTerrainLabel(terrain) {
        return getTerrainStyle(terrain).label;
      }

      function getFriendlyDamageReport(baseHpA, maxHp) {
        const ratio = maxHp > 0 ? baseHpA / maxHp : 0;
        if (ratio >= 0.8) return "味方部隊の損耗は軽微です。";
        if (ratio >= 0.5) return "味方前衛に被害が出ています。";
        if (ratio >= 0.2) return "味方スナイパーが破損。前線維持に注意してください。";
        return "味方部隊は危険域です。本陣防衛を優先してください。";
      }

      function getEnemyResultReport(baseHpB, maxBaseHp) {
        const ratio = maxBaseHp > 0 ? baseHpB / maxBaseHp : 0;
        if (ratio >= 0.8) return "敵本陣への有効打はまだ限定的です。";
        if (ratio >= 0.5) return "敵本陣に損傷を確認しています。";
        if (ratio >= 0.2) return "敵本陣は大きく損傷しています。";
        return "敵本陣は崩壊寸前です。";
      }

      function getOperatorReport(baseHpA, baseHpB, maxHp) {
        return [
          getFriendlyDamageReport(baseHpA, maxHp),
          getEnemyResultReport(baseHpB, maxHp),
          "現在の作戦候補を提示します。",
        ].join("<br />");
      }

      function toCircledDigit(value) {
        const digits = ["", "①", "②", "③", "④", "⑤", "⑥", "⑦", "⑧", "⑨"];
        return digits[value] ?? `${value}`;
      }

      function getRepairStatusText(queue) {
        if (!queue.length) return "なし";
        return queue.map((item) => `${item.name}${toCircledDigit(item.timer)}`).join(" ");
      }

      function drawBaseHpGauge(gaugeId, valueId, currentHp, maxHp, extraText = "") {
        const hpRate = Math.max(0, Math.min(1, currentHp / maxHp));
        const fill = document.getElementById(gaugeId);
        const value = document.getElementById(valueId);
        const inlineValue = document.getElementById(valueId + "Text");
        if (fill) {
          fill.style.width = `${hpRate * 100}%`;
          fill.className = `gauge-fill ${hpRate > 0.5 ? "" : hpRate > 0.2 ? "mid" : "low"}`.trim();
        }
        if (value) {
          value.textContent = `${currentHp} / ${maxHp}`;
        }
        if (inlineValue) {
          inlineValue.textContent = `${currentHp} / ${maxHp}${extraText ? `　修理状況: ${extraText}` : ""}`;
        }
      }

      function drawMap() {
        const cols = map[0].length;
        const rows = map.length;
        const cellSize = Math.floor(Math.min(canvas.width / cols, canvas.height / rows));
        const mapWidth = cellSize * cols;
        const mapHeight = cellSize * rows;
        const mapX = Math.floor((canvas.width - mapWidth) / 2);
        const mapY = 0;

        ctx.lineWidth = 1;
        ctx.strokeStyle = "rgba(0, 0, 0, 0.12)";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `bold ${Math.max(16, Math.floor(cellSize * 0.42))}px sans-serif`;
        ctx.fillStyle = "rgba(255, 255, 255, 0.9)";

        for (let y = 0; y < rows; y++) {
          for (let x = 0; x < cols; x++) {
            const terrain = map[y][x];
            const { fill } = getTerrainStyle(terrain);
            const px = mapX + x * cellSize;
            const py = mapY + y * cellSize;

            ctx.fillStyle = fill;
            ctx.fillRect(px, py, cellSize, cellSize);
            ctx.strokeRect(px, py, cellSize, cellSize);

            ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
            ctx.fillText(getTerrainLabel(terrain), Math.round(px + cellSize / 2), Math.round(py + cellSize / 2));
          }
        }
      }

      function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#f6f7fb";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        document.getElementById("roundInfo").textContent = `Round ${state.round} / ${maxRound}`;
        document.getElementById("operator").innerHTML = getOperatorReport(state.baseHpA, state.baseHpB, maxBaseHp);
        drawBaseHpGauge("bGauge", "bGaugeValue", state.baseHpB, maxBaseHp);
        drawBaseHpGauge("aGauge", "aGaugeValue", state.baseHpA, maxBaseHp, getRepairStatusText(state.repairQueueA));
        drawMap();
      }

      function getCommandDamage(commandId) {
        switch (commandId) {
          case "A.中央突破":
            return { damageA: 3000, damageB: 2000 };
          case "B.側面展開":
            return { damageA: 500, damageB: 1000 };
          case "C.迎撃対応":
            return { damageA: 200, damageB: 600 };
          default:
            return { damageA: 0, damageB: 0 };
        }
      }

      function judgeResult() {
        if (state.baseHpA <= 0 && state.baseHpB <= 0) {
          state.result = "DRAW";
          return true;
        }

        if (state.baseHpB <= 0) {
          state.result = "WIN";
          return true;
        }

        if (state.baseHpA <= 0) {
          state.result = "LOSE";
          return true;
        }

        return false;
      }

      function finalizeByHp() {
        state.result = "DRAW";
      }

      function setCommandButtonsEnabled(enabled) {
        document.querySelectorAll("button[data-command]").forEach((button) => {
          button.disabled = !enabled;
        });
      }

      function getActiveUnitCount(team) {
        return team === "A" ? maxUnitsA - state.repairQueueA.length : maxUnitsB - state.repairQueueB.length;
      }

      function getNextRepairUnitName(team) {
        if (team === "A") {
          const name = repairUnitNames[state.nextRepairUnitIndexA % repairUnitNames.length];
          state.nextRepairUnitIndexA += 1;
          return name;
        }
        const name = repairUnitNames[state.nextRepairUnitIndexB % repairUnitNames.length];
        state.nextRepairUnitIndexB += 1;
        return name;
      }

      function addRepairsFromDamage(team, damageAmount) {
        const damagePoolKey = team === "A" ? "damagePoolA" : "damagePoolB";
        const queueKey = team === "A" ? "repairQueueA" : "repairQueueB";
        const maxUnits = team === "A" ? maxUnitsA : maxUnitsB;
        state[damagePoolKey] += damageAmount;
        resolveRepairPool(team);
      }

      function resolveRepairPool(team) {
        const damagePoolKey = team === "A" ? "damagePoolA" : "damagePoolB";
        const queueKey = team === "A" ? "repairQueueA" : "repairQueueB";
        const maxUnits = team === "A" ? maxUnitsA : maxUnitsB;
        while (state[damagePoolKey] >= 1000 && state[queueKey].length < maxUnits) {
          state[damagePoolKey] -= 1000;
          state[queueKey].push({ name: getNextRepairUnitName(team), timer: 3 });
        }
      }

      function advanceRepairQueues() {
        for (const queue of [state.repairQueueA, state.repairQueueB]) {
          for (let i = queue.length - 1; i >= 0; i--) {
            queue[i].timer -= 1;
            if (queue[i].timer <= 0) {
              queue.splice(i, 1);
            }
          }
        }
        resolveRepairPool("A");
        resolveRepairPool("B");
      }

      function showResult() {
        const resultOverlay = document.getElementById("resultOverlay");
        const resultTitle = document.getElementById("resultTitle");
        const resultSubtitle = document.getElementById("resultSubtitle");
        const resultHistory = document.getElementById("resultHistory");
        resultOverlay.classList.add("show");
        resultOverlay.setAttribute("aria-hidden", "false");
        resultTitle.textContent = state.result ?? "";
        if (state.result === "WIN") {
          resultSubtitle.textContent = "作戦成功";
        } else if (state.result === "LOSE") {
          resultSubtitle.textContent = "作戦失敗";
        } else {
          resultSubtitle.textContent = "戦線膠着";
        }
        resultHistory.textContent = `作戦履歴: ${state.commandHistory.length ? state.commandHistory.join(" ") : "なし"}`;
      }

      function resetGame() {
        state.round = 1;
        state.baseHpA = maxBaseHp;
        state.baseHpB = maxBaseHp;
        state.result = null;
        state.commandHistory = [];
        state.repairQueueA = [];
        state.repairQueueB = [];
        state.damagePoolA = 0;
        state.damagePoolB = 0;
        state.nextRepairUnitIndexA = 0;
        state.nextRepairUnitIndexB = 0;
        document.getElementById("resultOverlay").classList.remove("show");
        document.getElementById("resultOverlay").setAttribute("aria-hidden", "true");
        document.getElementById("resultTitle").textContent = "";
        document.getElementById("resultSubtitle").textContent = "";
        document.getElementById("resultHistory").textContent = "";
        document.getElementById("operator").innerHTML = getOperatorReport(state.baseHpA, state.baseHpB, maxBaseHp);
        setCommandButtonsEnabled(true);
        render();
      }

      function handleCommand(commandId) {
        if (state.result) return;

        state.commandHistory.push(commandId[0]);

        const chosenDamage = getCommandDamage(commandId);
        const activeA = getActiveUnitCount("A");
        const activeB = getActiveUnitCount("B");
        const actualDamageA = Math.round(chosenDamage.damageA * (activeB / maxUnitsB));
        const actualDamageB = Math.round(chosenDamage.damageB * (activeA / maxUnitsA));

        state.baseHpA = Math.max(0, state.baseHpA - actualDamageA);
        state.baseHpB = Math.max(0, state.baseHpB - actualDamageB);
        addRepairsFromDamage("A", actualDamageA);
        addRepairsFromDamage("B", actualDamageB);
        advanceRepairQueues();

        if (judgeResult()) {
          render();
          setCommandButtonsEnabled(false);
          showResult();
          return;
        }

        if (state.round >= maxRound) {
          finalizeByHp();
          render();
          setCommandButtonsEnabled(false);
          showResult();
          return;
        }

        state.round += 1;
        render();
      }

      document.querySelectorAll("button[data-command]").forEach((button) => {
        button.addEventListener("click", () => handleCommand(button.dataset.command));
      });

      document.getElementById("restartButton").addEventListener("click", resetGame);

      render();
    </script>
  </body>
</html>
